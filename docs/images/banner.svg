<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F46800"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <!-- Dashboard icon -->
  <g transform="translate(105, 100)">
    <!-- Outer gauge arc -->
    <path d="M -30,8 A 34,34 0 1,1 30,8" fill="none" stroke="white" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
    <!-- Gauge tick marks -->
    <line x1="-26" y1="-18" x2="-22" y2="-15" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="0" y1="-34" x2="0" y2="-29" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="26" y1="-18" x2="22" y2="-15" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <!-- Gauge needle pointing to ~75% (upper-right) -->
    <line x1="0" y1="0" x2="18" y2="-20" stroke="white" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.9"/>
    <!-- Mini bar chart below gauge -->
    <rect x="-20" y="16" width="7" height="14" rx="1.5" fill="white" opacity="0.3"/>
    <rect x="-9" y="10" width="7" height="20" rx="1.5" fill="white" opacity="0.45"/>
    <rect x="2" y="18" width="7" height="12" rx="1.5" fill="white" opacity="0.25"/>
    <rect x="13" y="6" width="7" height="24" rx="1.5" fill="white" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="520" y="88" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="bold" fill="white" text-anchor="middle">Rightsizing Dashboard</text>
  <!-- Subtitle -->
  <text x="520" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" opacity="0.8" text-anchor="middle">Assess overcommitted Kubernetes clusters with Grafana</text>
</svg>
