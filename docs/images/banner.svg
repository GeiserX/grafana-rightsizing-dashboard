<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F46800"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g stroke="white" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <!-- Dashboard panels / gauges icon -->
  <g transform="translate(120, 100)">
    <!-- Panel frames -->
    <rect x="-42" y="-32" width="35" height="25" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    <rect x="-2" y="-32" width="35" height="25" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    <rect x="-42" y="-2" width="35" height="25" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    <rect x="-2" y="-2" width="35" height="25" rx="3" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
    <!-- Gauge arc in top-left panel -->
    <path d="M -32,-14 A 10,10 0 0,1 -17,-14" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <line x1="-24.5" y1="-14" x2="-21" y2="-22" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Bar chart in top-right panel -->
    <rect x="5" y="-15" width="5" height="10" fill="white" opacity="0.3"/>
    <rect x="13" y="-22" width="5" height="17" fill="white" opacity="0.3"/>
    <rect x="21" y="-18" width="5" height="13" fill="white" opacity="0.3"/>
    <!-- Line chart in bottom-left panel -->
    <polyline points="-36,16 -30,8 -22,14 -14,5" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    <!-- Percentage in bottom-right panel -->
    <text x="15" y="16" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="white" opacity="0.5" text-anchor="middle">87%</text>
  </g>
  <!-- Title -->
  <text x="490" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Grafana Rightsizing Dashboard</text>
  <!-- Subtitle -->
  <text x="490" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="white" opacity="0.8" text-anchor="middle">Assess overcommitted Kubernetes clusters</text>
</svg>
